<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dojutsu Awakening: Perfect Alignment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --iris-x: 0px;
            --iris-y: 0px;
            --eye-open: 35%; 
            --emotion-glow: 1;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: white;
            font-family: sans-serif;
            user-select: none;
        }

        #chakra-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        .eye-container {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 10vw;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }

        /* 3D Orbit Container */
        .eye-socket {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s ease-out;
            filter: drop-shadow(0 0 calc(20px * var(--emotion-glow)) rgba(255, 255, 255, 0.2));
        }

        /* Perfect Anime Eye Shape using Clip-Path */
        .sclera {
            width: 320px;
            height: 180px;
            background: radial-gradient(circle at center, #ffffff 10%, #fcd5ce 60%, #800000 100%);
            clip-path: ellipse(50% var(--eye-open) at 50% 50%);
            transition: clip-path 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Eye Shadows for Depth */
        .sclera::after {
            content: '';
            position: absolute;
            inset: 0;
            box-shadow: inset 0 15px 30px rgba(0,0,0,0.8), inset 0 -10px 20px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 20;
        }

        /* Blood Veins */
        .veins {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 40%, rgba(150,0,0,0.6) 80%, rgba(100,0,0,0.9) 100%);
            opacity: 0.7;
            z-index: 1;
            transition: opacity 0.3s ease;
        }

        /* Iris Movement Tracker */
        .iris-tracker {
            position: absolute;
            transform: translate(var(--iris-x), var(--iris-y));
            transition: transform 0.05s linear;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            z-index: 10;
        }

        /* Realistic Reflections */
        .reflection-main {
            position: absolute; top: 15%; left: 20%; width: 20px; height: 20px;
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%; z-index: 30; pointer-events: none;
        }
        .reflection-sub {
            position: absolute; bottom: 20%; right: 25%; width: 10px; height: 10px;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%; z-index: 30; pointer-events: none;
        }

        /* ==================== */
        /* Mangekyo Sharingan   */
        /* ==================== */
        .sharingan-iris {
            width: 100%; height: 100%;
            background: radial-gradient(circle, #500 10%, #d00000 60%, #300 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 calc(30px * var(--emotion-glow)) #f00, inset 0 0 20px #000;
            animation: spin 8s linear infinite, heartbeat 1.5s infinite alternate;
        }

        .sharingan-pupil {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 24px; height: 24px; background: #000; border-radius: 50%; z-index: 2;
            box-shadow: 0 0 10px #000;
        }

        .tomoe-wrapper {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            transform-origin: center;
        }
        .tomoe-wrapper:nth-child(2) { transform: rotate(120deg); }
        .tomoe-wrapper:nth-child(3) { transform: rotate(240deg); }

        .tomoe {
            position: absolute;
            width: 16px; height: 16px; background: #000; border-radius: 50%;
            top: 22px; left: 50%; transform: translateX(-50%);
        }
        .tomoe::after {
            content: ''; position: absolute; top: -8px; left: -4px;
            width: 20px; height: 20px;
            border-left: 7px solid #000; border-bottom: 7px solid transparent;
            border-radius: 50%; transform: rotate(-35deg);
        }

        /* ==================== */
        /* Rinnegan             */
        /* ==================== */
        .rinnegan-iris {
            width: 100%; height: 100%;
            background: #7a5c99;
            border-radius: 50%;
            position: relative;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 calc(30px * var(--emotion-glow)) #96f, inset 0 0 20px #000;
            animation: heartbeat 1.5s infinite alternate;
        }

        .ripple {
            position: absolute; border: 2px solid #2a1a3a; border-radius: 50%;
            box-shadow: inset 0 0 6px rgba(0,0,0,0.6), 0 0 4px rgba(0,0,0,0.4);
        }
        .ripple-1 { width: 95%; height: 95%; }
        .ripple-2 { width: 70%; height: 70%; }
        .ripple-3 { width: 45%; height: 45%; }
        .ripple-4 { width: 20%; height: 20%; background: #110b17; box-shadow: 0 0 10px #000; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes heartbeat { 
            0% { transform: scale(1); filter: brightness(1); } 
            100% { transform: scale(1.02); filter: brightness(1.2); } 
        }

    </style>
</head>
<body>

    <canvas id="chakra-canvas"></canvas>

    <div class="eye-container" id="scene">
        <div class="eye-socket" id="left-eye">
            <div class="sclera">
                <div class="veins" id="left-veins"></div>
                <div class="iris-tracker">
                    <div class="sharingan-iris">
                        <div class="sharingan-pupil"></div>
                        <div class="tomoe-wrapper"><div class="tomoe"></div></div>
                        <div class="tomoe-wrapper"><div class="tomoe"></div></div>
                        <div class="tomoe-wrapper"><div class="tomoe"></div></div>
                    </div>
                    <div class="reflection-main"></div>
                    <div class="reflection-sub"></div>
                </div>
            </div>
        </div>

        <div class="eye-socket" id="right-eye" style="filter: drop-shadow(0 0 calc(20px * var(--emotion-glow)) rgba(150, 100, 255, 0.2));">
            <div class="sclera">
                <div class="veins" id="right-veins" style="background: radial-gradient(circle at center, transparent 40%, rgba(80,0,120,0.6) 80%, rgba(50,0,80,0.9) 100%);"></div>
                <div class="iris-tracker">
                    <div class="rinnegan-iris">
                        <div class="ripple ripple-1"></div>
                        <div class="ripple ripple-2"></div>
                        <div class="ripple ripple-3"></div>
                        <div class="ripple ripple-4"></div>
                    </div>
                    <div class="reflection-main"></div>
                    <div class="reflection-sub"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const root = document.documentElement;
        const sockets = document.querySelectorAll('.eye-socket');
        let isPowerMode = false;

        // Mouse tracking for parallax and iris movement
        document.addEventListener('mousemove', (e) => {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const dx = e.clientX - cx;
            const dy = e.clientY - cy;

            // 3D socket rotation
            const rotateX = (dy / cy) * -15;
            const rotateY = (dx / cx) * 15;
            sockets.forEach(s => s.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`);

            // Iris tracking inside sclera (limits movement so it stays natural)
            const irisMaxX = 35;
            const irisMaxY = 15;
            root.style.setProperty('--iris-x', `${(dx / cx) * irisMaxX}px`);
            root.style.setProperty('--iris-y', `${(dy / cy) * irisMaxY}px`);

            // Micro-expressions: Squint slightly when cursor is near the center
            if (!isPowerMode) {
                const dist = Math.hypot(dx, dy);
                const maxDist = Math.hypot(cx, cy);
                const focusLevel = 1 - (dist / maxDist);
                // Base open is 35%, drops to 28% at max focus
                root.style.setProperty('--eye-open', `${35 - (focusLevel * 7)}%`);
                root.style.setProperty('--emotion-glow', 1 + (focusLevel * 0.3));
            }
        });

        // Natural Blinking Mechanism
        function blink() {
            if (isPowerMode) return; // Prevent normal blinking during power-up
            root.style.setProperty('--eye-open', '0%');
            setTimeout(() => {
                root.style.setProperty('--eye-open', '35%');
            }, 150);
            setTimeout(blink, Math.random() * 4000 + 2000);
        }
        setTimeout(blink, 2000);

        // Power-up Interaction (Widen eyes, flare glow)
        document.addEventListener('mousedown', () => {
            isPowerMode = true;
            root.style.setProperty('--eye-open', '45%'); // Widen
            root.style.setProperty('--emotion-glow', '2.5'); // Flare
            document.querySelector('.sharingan-iris').style.animationDuration = '3s';
        });

        document.addEventListener('mouseup', () => {
            isPowerMode = false;
            root.style.setProperty('--eye-open', '35%'); // Return to normal
            root.style.setProperty('--emotion-glow', '1');
            document.querySelector('.sharingan-iris').style.animationDuration = '8s';
        });

        // Particle System for Chakra
        const canvas = document.getElementById('chakra-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 2 + 1;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.color = Math.random() > 0.5 ? 'rgba(220, 30, 30, 0.5)' : 'rgba(140, 50, 220, 0.5)';
            }
            update() {
                this.y -= this.speedY * (isPowerMode ? 4 : 1);
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for(let i=0; i<100; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
